<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ AI 文案工坊 — Chutes 驱动 · 去中心化 AI</title>
    <style>
        :root{--bg:#050510;--card:rgba(255,255,255,0.03);--accent:#00d4aa;--gold:#f59e0b;--text:#e0e0f0;--text2:rgba(255,255,255,0.45)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'PingFang SC','Microsoft YaHei',sans-serif;
            background:radial-gradient(ellipse at 50% 0%,rgba(0,212,170,0.08),transparent 60%),var(--bg);
            color:var(--text);min-height:100vh;
        }
        .app{max-width:800px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
        header{text-align:center;padding:20px 0 10px}
        header h1{font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,#00d4aa,#14b8a6,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        header .badge{display:inline-block;padding:3px 12px;background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.25);border-radius:20px;font-size:11px;color:#00d4aa;letter-spacing:1px;margin-top:6px}
        .credits-bar{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:10px 20px;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:30px;font-size:13px}
        .credits-bar .num{font-weight:900;color:var(--gold);font-size:18px}
        .template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
        .tpl-card{padding:14px;background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s}
        .tpl-card:hover{border-color:#00d4aa;background:rgba(0,212,170,0.05);transform:translateY(-2px)}
        .tpl-card.active{border-color:#00d4aa;background:rgba(0,212,170,0.1)}
        .tpl-card .icon{font-size:26px;margin-bottom:4px}
        .tpl-card .lbl{font-size:13px;font-weight:600}
        .form-area{display:flex;flex-direction:column;gap:12px}
        .form-area textarea,.form-area input{
            width:100%;padding:14px 16px;background:var(--card);border:1px solid rgba(255,255,255,0.08);
            color:var(--text);border-radius:12px;font-size:14px;font-family:inherit;outline:none;resize:vertical;
        }
        .form-area textarea:focus,.form-area input:focus{border-color:#00d4aa}
        .form-area textarea{min-height:80px}
        .row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        @media(max-width:500px){.row-2{grid-template-columns:1fr}}
        .btn-generate{width:100%;padding:14px;background:linear-gradient(135deg,#00d4aa,#14b8a6);color:#000;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all 0.3s}
        .btn-generate:hover{transform:translateY(-1px)}
        .btn-generate:disabled{opacity:0.4;cursor:not-allowed;transform:none}
        .result-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;display:none}
        .result-card.show{display:block;animation:fadeIn 0.4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .result-card .res-body{background:#0f0f1a;border-radius:10px;padding:18px;font-size:14px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto}
        .result-card .res-actions{display:flex;gap:8px;margin-top:12px}
        .btn-copy{padding:8px 18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-radius:20px;cursor:pointer;font-size:12px}
        .btn-copy:hover{background:rgba(255,255,255,0.12)}
        .status-msg{text-align:center;font-size:13px;padding:8px;border-radius:8px;display:none}
        .status-msg.error{display:block;background:rgba(239,68,68,0.1);color:#f87171}
        .status-msg.success{display:block;background:rgba(16,185,129,0.1);color:#34d399}
        .chutes-info{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:12px;padding:14px;font-size:12px;text-align:center;color:rgba(255,255,255,0.6)}
        .chutes-info a{color:#00d4aa}
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>✍️ AI 文案工坊</h1>
        <div class="badge">⚡ Powered by Chutes · 去中心化 AI 推理</div>
    </header>

    <div class="credits-bar">
        🪙 剩余次数：<span class="num" id="creditsLeft">10</span>
    </div>

    <div class="chutes-info">
        🔗 使用 Chutes 去中心化 GPU 网络进行 AI 推理 | <a href="https://chutes.ai/app/api" target="_blank">获取 API Key (cpk_...)</a>
    </div>

    <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="apiKeyInput" placeholder="粘贴 Chutes API Key (cpk_...)" style="flex:1;padding:10px 14px;background:var(--card);border:1px solid rgba(255,255,255,0.08);color:var(--text);border-radius:10px;font-size:13px;font-family:monospace;outline:none">
        <button onclick="saveApiKey()" style="padding:10px 18px;background:#00d4aa;color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap">保存</button>
    </div>

    <div>
        <h3 style="font-size:14px;margin-bottom:10px;letter-spacing:2px">📋 选择文案类型</h3>
        <div class="template-grid" id="templateGrid"></div>
    </div>

    <div class="form-area">
        <label>📝 描述你的需求</label>
        <textarea id="briefInput" placeholder="比如：一款新上市的有机洗发水，主打温和不伤发，适合敏感头皮..."></textarea>
        <div class="row-2">
            <div><label style="font-size:12px">🎯 目标受众</label><input id="audienceInput" placeholder="25-35岁女性 / 创业者 / 学生"></div>
            <div><label style="font-size:12px">🎨 风格偏好</label><input id="toneInput" placeholder="温暖治愈 / 专业严谨 / 活泼有趣"></div>
        </div>
        <div id="statusMsg" class="status-msg"></div>
        <button class="btn-generate" id="btnGenerate" onclick="generate()">⚡ Chutes 一键生成</button>
    </div>

    <div class="result-card" id="resultCard">
        <div class="res-body" id="resultBody"></div>
        <div class="res-actions">
            <button class="btn-copy" onclick="copyResult()">📋 复制全文</button>
            <button class="btn-copy" onclick="regenerate()">🔄 重新生成</button>
        </div>
    </div>
</div>

<script>
const TEMPLATES=[
    {id:'xiaohongshu',icon:'📕',label:'小红书文案'},
    {id:'product',icon:'🛍️',label:'商品描述'},
    {id:'ad',icon:'📢',label:'广告语'},
    {id:'script',icon:'🎬',label:'短视频脚本'},
    {id:'article',icon:'📰',label:'公众号文章'},
    {id:'resume',icon:'📄',label:'简历优化'},
    {id:'email',icon:'📧',label:'营销邮件'},
    {id:'seo',icon:'🔍',label:'SEO 文案'},
];
let currentTpl='xiaohongshu';

const PROMPTS={
    xiaohongshu:'你是小红书文案专家。产品：{brief}。受众：{audience}。风格：{tone}。写一篇小红书种草笔记，300-500字，带emoji和标签，语气像真人分享。',
    product:'你是电商文案策划。产品：{brief}。受众：{audience}。风格：{tone}。写商品详情页文案，包含标题、核心卖点3-5条、使用场景，400-600字。',
    ad:'你是广告创意总监。品牌：{brief}。受众：{audience}。风格：{tone}。生成5条广告语/Slogan，每条附创意说明。包含情感向、功能向、反差向。',
    script:'你是短视频编导。主题：{brief}。受众：{audience}。风格：{tone}。写30-60秒短视频脚本，包含分镜描述（画面+台词+时长），前3秒有钩子。',
    article:'你是公众号主编。主题：{brief}。受众：{audience}。风格：{tone}。写公众号文章，提供3个备选标题，正文800-1200字，结构完整。',
    resume:'你是资深HR。求职者背景：{brief}。目标岗位：{audience}。风格：{tone}。优化简历，生成自我评价100-150字，提炼3-5条核心竞争力。',
    email:'你是CRM营销专家。产品：{brief}。受众：{audience}。风格：{tone}。写营销邮件，包含主题行、正文200-300字，CTA清晰。',
    seo:'你是SEO专家。网站：{brief}。关键词：{audience}。风格：{tone}。生成优化后的Title、Meta Description、200字SEO文案。',
};

function init(){
    document.getElementById('templateGrid').innerHTML=TEMPLATES.map(t=>`
        <div class="tpl-card${t.id===currentTpl?' active':''}" onclick="selectTpl('${t.id}')">
            <div class="icon">${t.icon}</div><div class="lbl">${t.label}</div>
        </div>`).join('');
    updateCredits();
    const savedKey=localStorage.getItem('chutesApiKey');
    if(savedKey)document.getElementById('apiKeyInput').value=savedKey;
}
function selectTpl(id){currentTpl=id;init()}

function updateCredits(){
    const c=parseInt(localStorage.getItem('chutesCredits')||'10');
    document.getElementById('creditsLeft').textContent=c;
    document.getElementById('btnGenerate').disabled=c<=0;
}

function saveApiKey(){
    const key=document.getElementById('apiKeyInput').value.trim();
    if(!key){alert('请粘贴 Chutes API Key (cpk_...)');return}
    localStorage.setItem('chutesApiKey',key);
    showStatus('✅ Chutes API Key 已保存！','success');
}

async function generate(){
    const apiKey=localStorage.getItem('chutesApiKey');
    if(!apiKey){showStatus('⚠️ 请先设置 Chutes API Key（去 chutes.ai/app/api 免费获取）','error');return}

    const brief=document.getElementById('briefInput').value.trim();
    if(!brief){showStatus('请填写需求描述','error');return}

    let credits=parseInt(localStorage.getItem('chutesCredits')||'10');
    if(credits<=0){showStatus('🪙 免费次数已用完','error');return}

    const audience=document.getElementById('audienceInput').value.trim()||'未指定';
    const tone=document.getElementById('toneInput').value.trim()||'未指定';
    const prompt=PROMPTS[currentTpl].replace('{brief}',brief).replace('{audience}',audience).replace('{tone}',tone);

    document.getElementById('btnGenerate').disabled=true;
    document.getElementById('btnGenerate').textContent='⏳ Chutes 推理中...';
    document.getElementById('statusMsg').className='status-msg';

    try{
        // Chutes OpenAI-compatible API
        const resp=await fetch('https://llm.chutes.ai/v1/chat/completions',{
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'Authorization':'Bearer '+apiKey
            },
            body:JSON.stringify({
                model:'deepseek-ai/DeepSeek-V3-0324',
                messages:[{role:'user',content:prompt}],
                temperature:0.7,
                max_tokens:2048
            })
        });

        if(!resp.ok){
            const err=await resp.json().catch(()=>({}));
            throw new Error(err.error?.message||'Chutes API 请求失败 ('+resp.status+')');
        }

        const data=await resp.json();
        const text=data.choices?.[0]?.message?.content||'(Chutes 返回为空，请重试)';

        document.getElementById('resultBody').textContent=text;
        document.getElementById('resultCard').classList.add('show');
        document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});

        credits--;
        localStorage.setItem('chutesCredits',credits);
        updateCredits();
        showStatus('✅ Chutes 去中心化推理完成！剩余 '+credits+' 次','success');
    }catch(e){
        showStatus('❌ '+e.message,'error');
    }finally{
        document.getElementById('btnGenerate').disabled=credits<=0;
        document.getElementById('btnGenerate').textContent='⚡ Chutes 一键生成';
    }
}

function copyResult(){
    navigator.clipboard.writeText(document.getElementById('resultBody').textContent)
        .then(()=>showStatus('📋 已复制','success'));
}
function regenerate(){generate()}
function showStatus(msg,type){
    const el=document.getElementById('statusMsg');
    el.textContent=msg;el.className='status-msg '+type;
    setTimeout(()=>{el.className='status-msg';el.textContent=''},5000);
}
init();
</script>
</body>
</html>
