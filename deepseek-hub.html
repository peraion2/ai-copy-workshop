<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 AI 万界 — DeepSeek 驱动的智能中枢</title>
    <style>
        :root{--bg:#0a0a0f;--s:rgba(255,255,255,0.03);--accent:#6366f1;--gold:#f59e0b;--t:#e8e8f0;--t2:rgba(255,255,255,0.45)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;overflow:hidden}
        /* Sidebar */
        .side{width:260px;background:rgba(255,255,255,0.02);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;flex-shrink:0}
        .side-h{padding:20px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .side-h h1{font-size:18px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#818cf8,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .side-h .tag{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px}
        .model-list{flex:1;overflow-y:auto;padding:12px}
        .model{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all 0.2s;border:1px solid transparent}
        .model:hover{border-color:rgba(99,102,241,0.2);background:rgba(99,102,241,0.04)}
        .model.active{border-color:var(--accent);background:rgba(99,102,241,0.08)}
        .model .icon{font-size:20px}
        .model .info .n{font-size:13px;font-weight:600}
        .model .info .d{font-size:10px;color:var(--t2)}
        .side-f{padding:14px;border-top:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;gap:8px}
        .side-f .credits{font-size:11px;color:var(--t2);text-align:center}
        .side-f .credits b{color:var(--gold);font-size:14px}
        .side-f button{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--t);cursor:pointer;font-size:11px;transition:all 0.2s}
        .side-f button:hover{border-color:var(--accent)}
        .side-f button.pay{background:var(--accent);border:none;color:#fff;font-weight:600}
        /* Main */
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        .chat-h{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;font-weight:600}
        .chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px}
        .msg{display:flex;gap:10px;max-width:80%;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{align-self:flex-end;flex-direction:row-reverse}
        .msg.assistant{align-self:flex-start}
        .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .msg.user .msg-avatar{background:var(--accent)}
        .msg.assistant .msg-avatar{background:rgba(255,255,255,0.06)}
        .msg-bubble{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 18px;font-size:14px;line-height:1.7}
        .msg.user .msg-bubble{background:var(--accent)}
        .msg-bubble pre{background:#000;border-radius:8px;padding:14px;overflow-x:auto;margin:8px 0;font-size:12px}
        .msg-bubble code{font-family:monospace;font-size:12px}
        .tip{text-align:center;color:var(--t2);padding:40px 20px}
        .tip .logo{font-size:48px;margin-bottom:12px}
        .tip h2{font-size:20px;margin-bottom:6px}
        .tip p{font-size:13px}
        /* Input */
        .input-area{padding:16px 24px;border-top:1px solid rgba(255,255,255,0.05)}
        .input-row{display:flex;gap:8px;align-items:flex-end}
        .input-row textarea{flex:1;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:var(--t);border-radius:12px;font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:150px;outline:none;line-height:1.4}
        .input-row textarea:focus{border-color:var(--accent)}
        .input-row .send{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;transition:all 0.2s}
        .input-row .send:hover{background:#4f46e5}
        .input-row .send:disabled{opacity:0.3;cursor:not-allowed}
        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;display:none}
        .modal-overlay.show{display:flex}
        .modal{background:#1a1a24;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;width:420px;max-width:90vw}
        .modal h3{font-size:18px;margin-bottom:20px;text-align:center}
        .plans{display:flex;gap:10px;margin-bottom:20px}
        .plan-card{flex:1;padding:18px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;text-align:center;cursor:pointer;transition:all 0.2s}
        .plan-card:hover{border-color:var(--accent)}
        .plan-card.sel{border-color:var(--accent);background:rgba(99,102,241,0.08)}
        .plan-card .p{font-size:13px;font-weight:600;margin-bottom:4px}
        .plan-card .pr{font-size:22px;font-weight:900;color:var(--gold)}
        .plan-card .pr span{font-size:11px;color:var(--t2)}
        .modal .btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
        .modal .btn.pay{background:var(--accent);color:#fff}
        .modal .btn.ghost{background:transparent;color:var(--t2);margin-top:8px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a24;color:var(--t);padding:12px 24px;border-radius:20px;z-index:200;font-size:13px;border:1px solid rgba(255,255,255,0.1);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0}}
        @media(max-width:700px){.side{width:60px}.side-h h1,.side-h .tag,.model .info,.side-f .credits,.side-f button span{display:none}}
    </style>
</head>
<body>

<aside class="side">
    <div class="side-h"><h1>🚀 AI 万界</h1><div class="tag">Powered by DeepSeek</div></div>
    <div class="model-list">
        <div class="model active" data-model="deepseek-chat" onclick="switchModel('deepseek-chat',this)">
            <div class="icon">⚡</div><div class="info"><div class="n">DeepSeek V3</div><div class="d">全能对话 · 高速响应</div></div>
        </div>
        <div class="model" data-model="deepseek-reasoner" onclick="switchModel('deepseek-reasoner',this)">
            <div class="icon">🧠</div><div class="info"><div class="n">DeepSeek R1</div><div class="d">深度推理 · 复杂问题</div></div>
        </div>
    </div>
    <div class="side-f">
        <div class="credits">🪙 剩余点数：<b id="creditDisplay">100</b></div>
        <button class="pay" onclick="showPricing()"><span>💳 充值点数</span></button>
        <button onclick="showAdmin()"><span>⚙️ 管理设置</span></button>
    </div>
</aside>

<main class="main">
    <div class="chat-h" id="chatTitle">⚡ DeepSeek V3</div>
    <div class="chat-msgs" id="chatMsgs">
        <div class="tip">
            <div class="logo">🚀</div>
            <h2>AI 万界 · 智能中枢</h2>
            <p>由 DeepSeek 官方 API 驱动 · 合规商用 · 稳定可靠</p>
            <p style="font-size:11px;margin-top:8px;">输入任何问题开始对话</p>
        </div>
    </div>
    <div class="input-area">
        <div class="input-row">
            <textarea id="chatInput" rows="1" placeholder="输入你的问题… (Enter 发送)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            <button class="send" id="btnSend" onclick="sendMsg()">➤</button>
        </div>
    </div>
</main>

<!-- Pricing Modal -->
<div class="modal-overlay" id="pricingModal">
    <div class="modal">
        <h3>💳 充值点数</h3>
        <div class="plans">
            <div class="plan-card sel" data-plan="basic" onclick="selectPlan(this)">
                <div class="p">基础包</div><div class="pr">¥29<span>/月</span></div>
                <div style="font-size:11px;color:var(--t2)">500 点/月</div>
            </div>
            <div class="plan-card" data-plan="pro" onclick="selectPlan(this)">
                <div class="p">专业包</div><div class="pr">¥59<span>/月</span></div>
                <div style="font-size:11px;color:var(--t2)">2000 点/月</div>
            </div>
            <div class="plan-card" data-plan="unlimited" onclick="selectPlan(this)">
                <div class="p">无限包</div><div class="pr">¥199<span>/年</span></div>
                <div style="font-size:11px;color:var(--t2)">无限使用</div>
            </div>
        </div>
        <button class="btn pay" onclick="purchase()">🔓 立即开通</button>
        <button class="btn ghost" onclick="hidePricing()">取消</button>
    </div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal">
    <div class="modal">
        <h3>⚙️ 管理员设置</h3>
        <label style="font-size:12px;color:var(--t2)">DeepSeek API Key</label>
        <input type="password" id="adminApiKey" placeholder="sk-..." style="width:100%;padding:10px;margin:8px 0 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:var(--t);border-radius:8px;font-size:13px;font-family:monospace">
        <label style="font-size:12px;color:var(--t2)">赠送新用户点数</label>
        <input type="number" id="adminDefaultCredits" value="100" style="width:100%;padding:10px;margin:8px 0 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:var(--t);border-radius:8px;font-size:13px">
        <button class="btn pay" onclick="saveAdmin()" style="margin-bottom:8px">💾 保存设置</button>
        <button class="btn ghost" onclick="hideAdmin()">取消</button>
    </div>
</div>

<div id="toastContainer"></div>

<script>
// State
let currentModel='deepseek-chat';
let selectedPlan='basic';
let credits=parseInt(localStorage.getItem('hubCredits')||'100');
let conversation=[];
const MODEL_NAMES={'deepseek-chat':'DeepSeek V3','deepseek-reasoner':'DeepSeek R1'};

function switchModel(model,el){
    currentModel=model;
    document.querySelectorAll('.model').forEach(m=>m.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('chatTitle').textContent=MODEL_NAMES[model]==='DeepSeek V3'?'⚡ DeepSeek V3':'🧠 DeepSeek R1';
    conversation=[];
    document.getElementById('chatMsgs').innerHTML='';
    addTip();
}

function updateCredits(){document.getElementById('creditDisplay').textContent=credits;}

function addTip(){
    const msgs=document.getElementById('chatMsgs');
    if(!msgs.querySelector('.tip')){
        msgs.innerHTML=`<div class="tip"><div class="logo">🚀</div><h2>AI 万界 · 智能中枢</h2><p>由 DeepSeek 官方 API 驱动 · 合规商用 · 稳定可靠</p></div>`;
    }
}

async function sendMsg(){
    const input=document.getElementById('chatInput');
    const text=input.value.trim();
    if(!text)return;
    if(credits<=0){toast('🪙 点数已用完，请充值');showPricing();return}

    const apiKey=localStorage.getItem('hubMasterKey');
    if(!apiKey){toast('⚙️ 请先设置 DeepSeek API Key');showAdmin();return}

    input.value='';
    document.getElementById('btnSend').disabled=true;
    removeTip();

    // User message
    addMessage('user',text);
    conversation.push({role:'user',content:text});

    // Typing indicator
    const typingId='typing-'+Date.now();
    addTyping(typingId);

    try{
        const resp=await fetch('https://api.deepseek.com/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body:JSON.stringify({model:currentModel,messages:conversation,stream:false,max_tokens:2048})
        });
        if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'请求失败('+resp.status+')')}
        const data=await resp.json();
        const reply=data.choices?.[0]?.message?.content||'(空响应)';
        removeTyping(typingId);
        addMessage('assistant',reply);
        conversation.push({role:'assistant',content:reply});
        credits--;
        localStorage.setItem('hubCredits',credits);
        updateCredits();
    }catch(e){
        removeTyping(typingId);
        addMessage('assistant','❌ '+e.message);
        toast('⚠️ '+e.message);
    }
    document.getElementById('btnSend').disabled=false;
    document.getElementById('chatInput').focus();
}

function addMessage(role,content){
    const msgs=document.getElementById('chatMsgs');
    const div=document.createElement('div');
    div.className='msg '+role;
    div.innerHTML=`<div class="msg-avatar">${role==='user'?'👤':'🤖'}</div><div class="msg-bubble">${formatContent(content)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
}

function formatContent(t){
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\n/g,'<br>');
}

function addTyping(id){
    const msgs=document.getElementById('chatMsgs');
    const div=document.createElement('div');
    div.className='msg assistant';div.id=id;
    div.innerHTML=`<div class="msg-avatar">🤖</div><div class="msg-bubble"><span style="animation:pulse 1s infinite">思考中…</span></div>`;
    msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(id){const el=document.getElementById(id);if(el)el.remove()}
function removeTip(){const el=document.querySelector('.tip');if(el)el.remove()}

function showPricing(){document.getElementById('pricingModal').classList.add('show')}
function hidePricing(){document.getElementById('pricingModal').classList.remove('show')}
function selectPlan(el){
    document.querySelectorAll('.plan-card').forEach(p=>p.classList.remove('sel'));
    el.classList.add('sel');
    selectedPlan=el.dataset.plan;
}
function purchase(){
    const amounts={basic:500,pro:2000,unlimited:99999};
    const planNames={basic:'基础包',pro:'专业包',unlimited:'无限包'};
    credits+=amounts[selectedPlan];
    localStorage.setItem('hubCredits',credits);
    updateCredits();
    hidePricing();
    toast('✅ 已开通 '+planNames[selectedPlan]+'！点数已到账');
}

function showAdmin(){document.getElementById('adminModal').classList.add('show');document.getElementById('adminApiKey').value=localStorage.getItem('hubMasterKey')||'';document.getElementById('adminDefaultCredits').value=localStorage.getItem('hubDefaultCredits')||'100'}
function hideAdmin(){document.getElementById('adminModal').classList.remove('show')}
function saveAdmin(){
    localStorage.setItem('hubMasterKey',document.getElementById('adminApiKey').value.trim());
    localStorage.setItem('hubDefaultCredits',document.getElementById('adminDefaultCredits').value);
    hideAdmin();
    toast('✅ 设置已保存');
}

function toast(msg){
    const el=document.createElement('div');
    el.className='toast';el.textContent=msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(()=>el.remove(),3000);
}

// Init
updateCredits();
if(localStorage.getItem('hubMasterKey'))document.getElementById('adminApiKey').value=localStorage.getItem('hubMasterKey');
</script>
</body>
</html>
